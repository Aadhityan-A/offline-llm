name: Build Offline LLM App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r offline-llm-app/requirements.txt
        pip install pyinstaller
        
    - name: Build with Flet
      run: |
        cd offline-llm-app
        flet pack main.py --name offline-llm-linux --icon None
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: offline-llm-linux
        path: offline-llm-app/dist/offline-llm-linux

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r offline-llm-app/requirements.txt
        pip install pyinstaller
        
    - name: Build with Flet
      run: |
        cd offline-llm-app
        flet pack main.py --name offline-llm-windows --icon None
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: offline-llm-windows
        path: offline-llm-app/dist/offline-llm-windows.exe

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r offline-llm-app/requirements.txt
        pip install pyinstaller
        
    - name: Build with Flet
      run: |
        cd offline-llm-app
        flet pack main.py --name offline-llm-mac --icon None
        # Note: macOS apps are bundles (.app), but flet pack might produce a single file or a folder depending on config.
        # Usually on Mac it creates a dist/offline-llm-mac.app or executable.
        # We will upload the whole dist folder content to be safe.
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: offline-llm-mac
        path: offline-llm-app/dist/
